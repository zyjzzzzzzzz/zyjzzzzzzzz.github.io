<style>
  /* 强制所有元素从左向右 */
  * {
    direction: ltr !important;
    unicode-bidi: normal !important;
  }
  body, .container, .main_header_content, .work-item, .about-section {
    direction: ltr !important;
    text-align: left !important;
  }
  /* 修复数字显示 */
  .work-item p, .lead, .skills-box {
    font-variant-numeric: lining-nums;
    font-feature-settings: "lnum";
  }
  /* 隐藏语言切换按钮（FA/EN） */
  .language_wrapper,
  #language,
  [onclick*="languageHandler"] {
    display: none !important;
  }
</style>
<style>
  .work-item {
    background: #f8f9fa;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    border-radius: 12px;
    border-left: 4px solid #2c7da0;
    transition: all 0.2s ease;
  }
  /* ... 其余样式保持不变 ... */
</style>
  <style>
  .work-item {
    background: #f8f9fa;

    transition: all 0.2s ease;
  }
  .work-item:hover {
    background: #e9ecef;
    transform: translateX(4px);
  }
  .work-item h3 {
    margin-top: 0;
    margin-bottom: 0.75rem;
    color: #1f5068;
    font-size: 1.25rem;
  }
  .work-item p {
    margin-bottom: 0;
    line-height: 1.6;
  }
  .lead {
    font-size: 1.1rem;
    font-weight: 500;
    color: #2c3e50;
  }
  .skills-box {
    background: #e9ecef;
    padding: 0.75rem 1.25rem;
    border-radius: 30px;
    display: inline-block;
    width: auto;
  }
  .badge {
    background: #2c7da0;
    color: white;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.85rem;
    margin: 0 0.25rem;
    display: inline-block;
  }
  .mt-4 { margin-top: 1.5rem; }
  .mt-3 { margin-top: 1rem; }
  .mb-0 { margin-bottom: 0; }
</style>
